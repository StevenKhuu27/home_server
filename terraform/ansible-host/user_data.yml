#cloud-config
# Cloud-init user-data for the Ansible control node.
# Creates an unprivileged `ansible` user, installs the minimum tools needed
# to run playbooks, and hardens SSH and the firewall before first login.

package_update: true
package_upgrade: true
package_reboot_if_required: true

users:
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOgztncKIjbQyM0YMSeHCAhR87PMuXPIQslbjLebNef3 steven@windows

disable_root: true
ssh_pwauth: false

packages:
  - ansible
  - curl
  - fail2ban
  - git
  - htop
  - qemu-guest-agent
  - ufw
  - unattended-upgrades
  - vim

# Drop SSH hardening into a config.d snippet rather than sed-editing the main
# sshd_config; the drop-in survives package upgrades and is easy to reason
# about. The sshd_config.d directory is included by default on Ubuntu 22.04+.
write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root:root
    permissions: "0644"
    content: |
      PasswordAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin no
      KbdInteractiveAuthentication no

runcmd:
  - systemctl enable --now qemu-guest-agent
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw --force enable
  - systemctl restart ssh
  - dpkg-reconfigure -f noninteractive unattended-upgrades

final_message: "Ansible control node provisioning complete."
