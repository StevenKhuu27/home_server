#cloud-config
# Cloud-init user-data for the docker host VM.
# Creates the human operator (`steven`) and the automation user (`ansible`),
# hardens SSH and the firewall, and pre-seeds GitHub's host key so Ansible's
# first-time clone doesn't prompt. Docker itself is installed later by the
# Ansible role rather than here, so this file stays small and fast.

package_update: true
package_upgrade: true
package_reboot_if_required: true

users:
  - name: steven
    groups: [sudo, admin]
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOgztncKIjbQyM0YMSeHCAhR87PMuXPIQslbjLebNef3 steven@windows
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEolNt/xCxyTL8Beh7n8Du+VBsxFEKfzL2IfVzYf/DM1 ansible@ubuntu
  - name: ansible
    groups: sudo
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEolNt/xCxyTL8Beh7n8Du+VBsxFEKfzL2IfVzYf/DM1 ansible@ubuntu

disable_root: true
ssh_pwauth: false

packages:
  - curl
  - fail2ban
  - htop
  - qemu-guest-agent
  - ufw
  - unattended-upgrades
  - vim

# Drop SSH hardening into a config.d snippet rather than sed-editing the main
# sshd_config; the drop-in survives package upgrades and is easy to reason
# about. The sshd_config.d directory is included by default on Ubuntu 22.04+.
write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root:root
    permissions: "0644"
    content: |
      PasswordAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin no
      KbdInteractiveAuthentication no

runcmd:
  - systemctl enable --now qemu-guest-agent
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow OpenSSH
  - ufw --force enable
  - systemctl restart ssh
  - dpkg-reconfigure -f noninteractive unattended-upgrades
  # Pre-seed github.com's host key so Ansible's git clone doesn't fail or
  # prompt interactively on first run.
  - install -d -o steven -g steven -m 0700 /home/steven/.ssh
  - ssh-keyscan -t ed25519 github.com >> /home/steven/.ssh/known_hosts
  - chown steven:steven /home/steven/.ssh/known_hosts
  - install -d -o steven -g steven -m 0755 /home/steven/app

final_message: "Docker host provisioning complete."
