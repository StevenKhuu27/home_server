---
# Install Docker Engine from the official Docker apt repository.
# We deliberately avoid Ubuntu's `docker.io` package so the host runs a
# current, upstream-supported Docker build with the Compose v2 plugin.

- name: Install prerequisites for the Docker apt repository
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
  register: docker_repo

# Refresh the apt cache only if the repo definition just changed.
- name: Update apt cache after adding Docker repo
  ansible.builtin.apt:
    update_cache: true
  when: docker_repo.changed

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - git
    state: present

# Stop systemd-resolved from binding :53 on the host so AdGuard (running in a
# container) can claim that port. notify: handlers will restart the services
# at the end of the play.
- name: Disable systemd-resolved DNS stub listener
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: "^#?DNSStubListener="
    line: "DNSStubListener=no"
  notify:
    - Restart systemd-resolved
    - Restart docker

- name: Flush handlers before continuing
  ansible.builtin.meta: flush_handlers

- name: Ensure docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present

- name: Add interactive and ansible users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop:
    - steven
    - ansible
  register: docker_group_membership

# Group changes don't apply to existing SSH sessions - reset the connection
# so subsequent docker_compose tasks can talk to the daemon without sudo.
- name: Reset SSH connection so new docker group membership takes effect
  ansible.builtin.meta: reset_connection
  when: docker_group_membership.changed
