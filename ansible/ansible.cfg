[defaults]
inventory          = ./inventory/
roles_path         = ./roles
collections_paths  = ./collections

# Use the system Python on the managed node without warnings.
interpreter_python = auto_silent

# Cleaner output (one task per line, durations on PLAY RECAP).
stdout_callback    = yaml
callbacks_enabled  = profile_tasks

# Don't prompt on first-time host key acceptance during local lab work.
# In a stricter environment, set this to True and pre-populate known_hosts.
host_key_checking  = False

# Speed up runs against multiple hosts.
forks              = 10
retry_files_enabled = False

[ssh_connection]
# Persist SSH multiplex connections so each task doesn't re-handshake.
pipelining       = True
ssh_args         = -o ControlMaster=auto -o ControlPersist=60s
