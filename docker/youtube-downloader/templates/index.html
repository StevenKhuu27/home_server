<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Download</title>
  </head>
  <body>
    <h1>YouTube Video Download</h1>
    <form id="download-form">
      <label for="url">Video URL:</label>
      <input type="text" id="url" name="url" required /><br /><br />

      <label for="start_time">Start Time (HH:MM:SS or MM:SS):</label>
      <input
        type="text"
        id="start_time"
        name="start_time"
        required
      /><br /><br />

      <label for="end_time">End Time (HH:MM:SS or MM:SS):</label>
      <input type="text" id="end_time" name="end_time" required /><br /><br />

      <button type="submit">Download Video</button>
    </form>

    <div id="result"></div>

    <script>
      const form = document.getElementById("download-form");
      const resultDiv = document.getElementById("result");

      form.addEventListener("submit", async (e) => {
        e.preventDefault(); // Prevent default form submission

        resultDiv.innerHTML = "Processing..."; // Show a processing message

        const url = document.getElementById("url").value;
        const start_time = document.getElementById("start_time").value;
        const end_time = document.getElementById("end_time").value;

        try {
          const response = await fetch("/download", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ url, start_time, end_time }),
          });
          if (!response.ok) {
            const text = await response.text();
            resultDiv.innerHTML = `<p style="color:red;">Error: ${text}</p>`;
            return;
          }

          const blob = await response.blob();

          const downloadUrl = window.URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = downloadUrl;
          a.download = "youtube_clip.mp4";

          document.body.appendChild(a);
          a.click();

          a.remove();
          window.URL.revokeObjectURL(downloadUrl);

          resultDiv.innerHTML = "Download started!";
        } catch (error) {
          resultDiv.innerHTML = `<p style="color:red;">Network error: ${error.message}</p>`;
        }
      });
    </script>
  </body>
</html>
