# Main app stack for the homelab docker host.
# Traefik fronts every HTTP service on the shared `proxy` network and routes
# by Host header, so adding a new app means adding labels rather than ports.
#
# Run from this directory after creating .env:
#   docker compose up -d
#
# The `proxy` network is created out-of-band (by Ansible) so it can be shared
# with the networking stack in ./networking/.

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      # Dashboard is not exposed on the host; reach it via the labelled
      # router at traefik.${DOMAIN_SUFFIX} (protected by basic-auth).
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN_SUFFIX}`)
      - traefik.http.routers.traefik.entrypoints=web
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=traefik-auth
      # TRAEFIK_DASHBOARD_AUTH is a htpasswd-style "user:hashed_password" pair.
      # Generate with: htpasswd -nbB admin 'your-password'
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  youtube-clip-downloader:
    build: ./youtube-downloader
    container_name: youtube-clip-downloader
    restart: unless-stopped
    volumes:
      - ytdlp_downloads:/app/downloads
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.ytdlp.rule=Host(`ytdlp.${DOMAIN_SUFFIX}`)
      - traefik.http.routers.ytdlp.entrypoints=web
      - traefik.http.services.ytdlp.loadbalancer.server.port=8001

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST}/
      - TZ=${TZ:-UTC}
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
      - N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN_SUFFIX}`)
      - traefik.http.routers.n8n.entrypoints=web
      - traefik.http.services.n8n.loadbalancer.server.port=5678

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - cadvisor
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN_SUFFIX}`)
      - traefik.http.routers.prometheus.entrypoints=web
      - traefik.http.services.prometheus.loadbalancer.server.port=9090

  # cAdvisor needs privileged access to expose container-level cgroup metrics
  # to Prometheus. Scope is read-only mounts where possible.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - proxy

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SERVER_ROOT_URL=http://grafana.${DOMAIN_SUFFIX}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN_SUFFIX}`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000

volumes:
  n8n_data:
    name: n8n_data
  grafana_data:
    name: grafana_data
  prometheus_data:
    name: prometheus_data
  ytdlp_downloads:
    name: ytdlp_downloads

networks:
  proxy:
    external: true
