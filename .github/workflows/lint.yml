name: lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  terraform:
    name: terraform fmt + validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [terraform/ansible-host, terraform/production]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive ${{ matrix.module }}

      - name: terraform init (no backend)
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: ${{ matrix.module }}
        run: terraform validate -no-color

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yamllint
      - run: yamllint .

  ansible-lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ansible and lint
        run: pip install ansible ansible-lint
      - name: Install collection dependencies
        run: ansible-galaxy collection install -r ansible/requirements.yml
      # ansible-lint runs `ansible-playbook --syntax-check`, which loads
      # vars_files. The real vault.yml is encrypted and CI has no password,
      # so swap in the plaintext example just for lint.
      - name: Provide plaintext vault for syntax check
        run: cp ansible/vars/vault.yml.example ansible/vars/vault.yml
      - name: ansible-lint
        working-directory: ansible
        run: ansible-lint

  hadolint:
    name: hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/youtube-downloader/Dockerfile
