---
extends: default

# Ansible-style YAML uses long inline maps and `true`/`false` interchangeably
# with `yes`/`no`, so the strict defaults need relaxing.
rules:
  line-length:
    max: 160
    level: warning
  truthy:
    allowed-values: ["true", "false", "yes", "no"]
    check-keys: false
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  document-start: disable
  braces:
    max-spaces-inside: 1
  indentation:
    spaces: 2
    indent-sequences: consistent

ignore: |
  .terraform/
  **/.terraform/
  ansible/vars/vault.yml
  **/*.tfstate*
  # cloud-init files require a `#cloud-config` magic header with no space.
  terraform/**/user_data.yml
